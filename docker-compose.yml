services:
  client-front:
    image: jardin-sonore-client:dev
    container_name: client-front
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./jardin-sonore-client:/app
      - node_modules:/app/node_modules
      - next:/app/.next
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  php:
    image: jardin-sonore-backend-php:dev
    container_name: php
    build:
      context: .
      dockerfile: docker/backend/php/Dockerfile
    environment:
      APP_ENV: "${BACKEND_APP_ENV:-dev}"
      DATABASE_URL: "mysql://${MYSQL_USER:-jardin_sonore}:${MYSQL_PASSWORD:-jardin_sonore}@mysql:3306/${MYSQL_DATABASE:-jardin_sonore}?serverVersion=8.4.0"
      MAILER_DSN: "smtp://mailpit:1025"
      MAILING_DAILY_LIMIT: "${MAILING_DAILY_LIMIT:-50}"
    volumes:
      - ./jardin-sonore-backend:/app
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "${BACKEND_PORT:-8080}:80"
    volumes:
      - ./jardin-sonore-backend:/app:ro
      - ./docker/backend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -S --spider http://127.0.0.1 2>&1 | grep -q 'HTTP/'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mysql:
    image: mysql:8.4
    container_name: jardin-sonore-mysql
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-jardin_sonore}"
      MYSQL_USER: "${MYSQL_USER:-jardin_sonore}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-jardin_sonore}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-jardin_sonore_root}"
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: jardin-sonore-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  node_modules:
    name: jardin-sonore-client_node_modules
  next:
    name: jardin-sonore-client_next
  mysql_data:
    name: jardin-sonore-mysql_data
