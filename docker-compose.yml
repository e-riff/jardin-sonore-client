services:
  client-front:
    image: jardin-sonore-client:dev
    container_name: client-front
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      HOST_UID: "${HOST_UID:-1000}"
      HOST_GID: "${HOST_GID:-1000}"
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./jardin-sonore-client:/app
      - node_modules:/app/node_modules
      - next:/app/.next
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  php:
    image: jardin-sonore-backend-php:dev
    container_name: php
    build:
      context: .
      dockerfile: docker/backend/php/Dockerfile
      args:
        HOST_UID: "${HOST_UID:-1000}"
        HOST_GID: "${HOST_GID:-1000}"
        HOST_USER_NAME: "${HOST_USER_NAME:-hostuser}"
        HOST_GROUP_NAME: "${HOST_GROUP_NAME:-hostgroup}"
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - ./jardin-sonore-backend/.env.local
    volumes:
      - ./jardin-sonore-backend:/app
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  messenger-worker:
    image: jardin-sonore-backend-php:dev
    container_name: jardin-sonore-messenger
    build:
      context: .
      dockerfile: docker/backend/php/Dockerfile
      args:
        HOST_UID: "${HOST_UID:-1000}"
        HOST_GID: "${HOST_GID:-1000}"
        HOST_USER_NAME: "${HOST_USER_NAME:-hostuser}"
        HOST_GROUP_NAME: "${HOST_GROUP_NAME:-hostgroup}"
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - ./jardin-sonore-backend/.env.local
    volumes:
      - ./jardin-sonore-backend:/app
    command:
      - php
      - bin/console
      - messenger:consume
      - --all
      - --memory-limit=256M
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "${BACKEND_PORT:-8080}:80"
      - "${BACKEND_HTTPS_PORT:-8443}:443"
    volumes:
      - ./jardin-sonore-backend:/app:ro
      - ./docker/backend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/backend/nginx/https.conf:/etc/nginx/conf.d/https.conf:ro
      - ./docker/backend/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -S --spider http://127.0.0.1 2>&1 | grep -q 'HTTP/'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mysql:
    image: mariadb:11.4.12
    container_name: jardin-sonore-mysql
    command:
      - --character-set-server=latin1
      - --collation-server=latin1_swedish_ci
    env_file:
      - ./jardin-sonore-backend/.env.local
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: jardin-sonore-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  node_modules:
    name: jardin-sonore-client_node_modules
  next:
    name: jardin-sonore-client_next
  mariadb_data:
    name: jardin-sonore-mariadb_data
